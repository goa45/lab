    {name:'Взаємодія тіл',      lessons:['Сила та маса','Сила тяжіння','Тертя','🔬 Лаб: Сила пружності']},

  ]},
  8:{ col:'#1a3d6b', accent:'#6699ee', themes:[
    {name:'Теплові явища',      lessons:['Внутрішня енергія','Теплопровідність','Конвекція. Випромінювання','🔬 Лаб: Питома теплоємність']},
    {name:'Зміна стану речовини',lessons:['Плавлення і тверднення','Випаровування','Кипіння','🔬 Лаб: Температура кипіння']},
    {name:'Електричний струм',  lessons:['Електричний заряд','Закон Ома','З\'єднання провідників','🔬 Лаб: Закон Ома']},
    {name:'Електромагнетизм',   lessons:['Магнітне поле струму','Сила Ампера','Електродвигун','🔬 Лаб: Магнітне поле']},
  ]},
  9:{ col:'#1a4d2a', accent:'#55cc77', themes:[
    {name:'Кінематика',          lessons:['Рівноприскорений рух','Вільне падіння','Рух по колу','🔬 Лаб: Прискорення при падінні']},
    {name:'Динаміка',            lessons:['Перший закон Ньютона','Другий закон Ньютона','Третій закон Ньютона','🔬 Лаб: ІІ закон Ньютона']},
    {name:'Коливання і хвилі',   lessons:['Гармонічні коливання','Математичний маятник','Звукові хвилі','🔬 Лаб: Математичний маятник']},
    {name:'Електромагн. індукція',lessons:['Досліди Фарадея','ЕРС індукції','Правило Ленца','🔬 Лаб: Індукційний струм']},
  ]},
  10:{col:'#5a4010', accent:'#ddaa44', themes:[
    {name:'Статика та гідростатика',lessons:['Умови рівноваги','Центр мас','Закон Паскаля (поглиблено)','🔬 Лаб: Умова рівноваги важеля']},
    {name:'Молекулярна фізика',  lessons:['Ідеальний газ','Ізотерма. Ізобара. Ізохора','Рівняння стану газу','🔬 Лаб: Закон Бойля–Маріотта']},

    {name:'Геометрична оптика',  lessons:['Відбиття і заломлення','Тонка лінза','Оптичні прилади','🔬 Лаб: Фокусна відстань лінзи']},
  ]},
  11:{col:'#3a1a6a', accent:'#aa77ee', themes:[
    {name:'Змінний струм',       lessons:['Генератор змінного струму','Трансформатор','LC-контур. Резонанс','🔬 Лаб: Резонанс у LC-контурі']},
    {name:'Хвильова оптика',     lessons:['Інтерференція','Дифракція','Дисперсія і поляризація','🔬 Лаб: Довжина хвилі лазера']},
    {name:'Квантова фізика',     lessons:['Фотоефект','Корпускулярно-хвильовий дуалізм','Модель атома Бора','🔬 Лаб: Спектри атомів']},
    {name:'Ядерна фізика',       lessons:['Будова ядра','Радіоактивний розпад','Ядерні реакції','🔬 Лаб: Радіаційний фон']},

// ================================================================
//  СТАН
// ================================================================
let navState = {level:0, cls:null};

// ================================================================
//  УТИЛІТИ СТВОРЕННЯ ЕЛЕМЕНТІВ
// ================================================================
function el(tag,attrs){
  const e=document.createElement('a-'+tag);
  for(const [k,v] of Object.entries(attrs||{})) e.setAttribute(k,v);
  return e;
}

function brassFrame(w,h){
  const g=document.createElement('a-entity');
  const m='color:#b87333; metalness:0.9; roughness:0.12';
  const t=0.022;
  [[`0 ${h/2+t/2} 0.01`,w+2*t,t],
   [`0 ${-h/2-t/2} 0.01`,w+2*t,t],
   [`${-w/2-t/2} 0 0.01`,t,h+2*t],
   [`${w/2+t/2} 0 0.01`,t,h+2*t]].forEach(([pos,bw,bh])=>{
    const b=el('box',{position:pos,width:bw,height:bh,depth:0.04,material:m});
    g.appendChild(b);
  });
  return g;
}

function mkText(val,color,scale,align){
  return el('text',{value:val,color:color||'#c87d32',scale:scale||'0.45 0.45 0.45',align:align||'center','wrap-count':24});
}

// ================================================================
//  НАВІГАЦІЯ
// ================================================================
function clearNav(){
  ['nav-0','nav-1','nav-2'].forEach(id=>{
    const n=document.getElementById(id);
    n.innerHTML=''; n.setAttribute('visible',false);
  });
}

function showLevel0(){
  clearNav(); navState={level:0,cls:null};
  const c=document.getElementById('nav-0');
  c.setAttribute('visible',true);

  // Заголовок над столом
  const titleGroup=document.createElement('a-entity');
  titleGroup.setAttribute('position','0 2.05 0.4');
  const titleBg=el('plane',{width:2.5,height:0.22,material:'color:#080400; opacity:0.9; transparent:true; side:double'});
  titleGroup.appendChild(titleBg);
  titleGroup.appendChild(brassFrame(2.5,0.22));
  const titleTxt=mkText('⚙  ОБЕРІТЬ КЛАС  ⚙','#c87d32','0.48 0.48 0.48');
  titleTxt.setAttribute('position','0 0 0.02');
  titleGroup.appendChild(titleTxt);
  c.appendChild(titleGroup);

  [7,8,9,10,11].forEach((cls,i)=>{
    const x=(i-2)*0.62;
    const panel=document.createElement('a-entity');
    panel.setAttribute('position',`${x} 1.55 0.4`);
    panel.classList.add('clickable');

    const bg=el('plane',{width:0.52,height:0.68,material:`color:${curriculum[cls].col}; opacity:0.92; transparent:true; side:double`});
    panel.appendChild(bg);
    panel.appendChild(brassFrame(0.52,0.68));

    const lbl=mkText(`${cls}\nклас`,curriculum[cls].accent,'0.52 0.52 0.52');
    lbl.setAttribute('position','0 0.1 0.02');
    panel.appendChild(lbl);

    // Маленька шестерня-іконка
    const gearRing=el('torus',{radius:0.1,radiusTubular:0.022,'segments-radial':8,'segments-tubular':8,position:'0 -0.2 0.03',material:'color:#b87333; metalness:0.9; roughness:0.1'});
    gearRing.setAttribute('animation',`property:rotation; to:0 0 360; dur:${3000+i*400}; loop:true; easing:linear`);
    panel.appendChild(gearRing);
    const gearHub=el('cylinder',{radius:0.035,height:0.05,position:'0 -0.2 0.03',material:'color:#c87d32; metalness:0.95'});
    panel.appendChild(gearHub);

    panel.addEventListener('click',()=>showLevel1(cls));
    panel.addEventListener('mouseenter',()=>bg.setAttribute('material',`color:${curriculum[cls].accent}; opacity:0.25; transparent:true; side:double`));
    panel.addEventListener('mouseleave',()=>bg.setAttribute('material',`color:${curriculum[cls].col}; opacity:0.92; transparent:true; side:double`));
    c.appendChild(panel);
  });
}

function showLevel1(cls){
  clearNav(); navState={level:1,cls};
  const c=document.getElementById('nav-1');
  c.setAttribute('visible',true);
  const {col,accent,themes}=curriculum[cls];

  // Заголовок
  const tg=document.createElement('a-entity');
  tg.setAttribute('position','0 2.08 0.6');
  const tbg=el('plane',{width:2.6,height:0.22,material:'color:#080400; opacity:0.92; transparent:true; side:double'});
  tg.appendChild(tbg); tg.appendChild(brassFrame(2.6,0.22));
  const ttx=mkText(`⚙  ${cls} КЛАС — ТЕМИ  ⚙`,accent,'0.48 0.48 0.48');
  ttx.setAttribute('position','0 0 0.02'); tg.appendChild(ttx);
  c.appendChild(tg);

  themes.forEach((theme,i)=>{
    const x = i%2===0 ? -0.72 : 0.72;
    const y = i<2 ? 1.76 : 1.24;
    const panel=document.createElement('a-entity');
    panel.setAttribute('position',`${x} ${y} 0.6`);
    panel.classList.add('clickable');

    const bg=el('plane',{width:1.28,height:0.42,material:'color:#090500; opacity:0.93; transparent:true; side:double'});
    panel.appendChild(bg); panel.appendChild(brassFrame(1.28,0.42));

    const nt=mkText(theme.name,accent,'0.38 0.38 0.38');
    nt.setAttribute('position','0 0.07 0.02'); panel.appendChild(nt);
    const ct=mkText(`${theme.lessons.length} занять · → натисніть`,'#776655','0.3 0.3 0.3');
    ct.setAttribute('position','0 -0.1 0.02'); panel.appendChild(ct);

    panel.addEventListener('click',()=>showLevel2(cls,i));
    panel.addEventListener('mouseenter',()=>bg.setAttribute('material',`color:${col}; opacity:0.6; transparent:true; side:double`));
    panel.addEventListener('mouseleave',()=>bg.setAttribute('material','color:#090500; opacity:0.93; transparent:true; side:double'));
    c.appendChild(panel);
  });

  addBack(c,()=>showLevel0());
}

function showLevel2(cls,ti){
  clearNav(); navState={level:2,cls};
  const c=document.getElementById('nav-2');
  c.setAttribute('visible',true);
  const {accent,themes}=curriculum[cls];
  const theme=themes[ti];
  const panH=0.28+theme.lessons.length*0.185;

  const mp=document.createElement('a-entity');
  mp.setAttribute('position',`0 ${1.08+panH/2} 0.6`);

  const bg=el('plane',{width:2.1,height:panH+0.35,material:'color:#060300; opacity:0.95; transparent:true; side:double'});
  mp.appendChild(bg); mp.appendChild(brassFrame(2.1,panH+0.35));

  const th=mkText(`${cls} клас  ·  ${theme.name}`,accent,'0.4 0.4 0.4');
  th.setAttribute('position',`0 ${panH/2+0.04} 0.02`); mp.appendChild(th);

  const div=el('box',{width:1.9,height:0.005,depth:0.01,position:`0 ${panH/2-0.16} 0.02`,material:'color:#b87333; metalness:0.8'});
  mp.appendChild(div);

  theme.lessons.forEach((lesson,i)=>{
    const y=panH/2-0.28-i*0.185;
    const isLab=lesson.startsWith('🔬');
    const dot=el('sphere',{radius:0.022,position:`-0.94 ${y+0.02} 0.03`,material:`color:${isLab?'#55cc55':'#b87333'}; metalness:0.8`});
    mp.appendChild(dot);
    const lt=mkText(lesson,isLab?'#77dd77':'#ccaa66','0.35 0.35 0.35','left');
    lt.setAttribute('position',`-0.88 ${y} 0.02`); mp.appendChild(lt);
  });

  c.appendChild(mp);
  addBack(c,()=>showLevel1(cls));
}

function addBack(container,cb){
  const btn=document.createElement('a-entity');
  btn.setAttribute('position','-1.5 1.06 0.6');
  btn.classList.add('clickable');
  const bg=el('plane',{width:0.55,height:0.22,material:'color:#150800; opacity:0.93; transparent:true; side:double'});
  btn.appendChild(bg); btn.appendChild(brassFrame(0.55,0.22));
  const t=mkText('← Назад','#c87d32','0.38 0.38 0.38');
  t.setAttribute('position','0 0 0.02'); btn.appendChild(t);
  btn.addEventListener('click',cb);
  btn.addEventListener('mouseenter',()=>bg.setAttribute('material','color:#3a1500; opacity:0.95; transparent:true; side:double'));
  btn.addEventListener('mouseleave',()=>bg.setAttribute('material','color:#150800; opacity:0.93; transparent:true; side:double'));
  container.appendChild(btn);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelector('a-scene').addEventListener('loaded',()=>setTimeout(showLevel0,600));
});
</script>
