function el(tag,attrs){
  const e=document.createElement('a-'+tag);
  for(const [k,v] of Object.entries(attrs||{})) e.setAttribute(k,String(v));
  return e;
}
function brassFrame(w,h){
  const g=document.createElement('a-entity');
  const m='color:#d49040; metalness:0.92; roughness:0.1';
  const t=0.024;
  [[`0 ${h/2+t/2} 0.012`,w+2*t,t],[`0 ${-h/2-t/2} 0.012`,w+2*t,t],
   [`${-w/2-t/2} 0 0.012`,t,h+2*t],[`${w/2+t/2} 0 0.012`,t,h+2*t]
  ].forEach(([pos,bw,bh])=>{
    g.appendChild(el('box',{position:pos,width:bw,height:bh,depth:0.045,material:m}));
  });
  return g;
}
function mkText(val,color,scale,align,wc){
  return el('text',{value:val,color:color||'#e09040',scale:scale||'0.45 0.45 0.45',align:align||'center','wrap-count':wc||26});
}
function clearNav(){
  ['nav-0','nav-1','nav-2'].forEach(id=>{
    const n=document.getElementById(id);
    if(n){n.innerHTML='';n.setAttribute('visible','false');}
  });
}

function showLevel0(){
  clearNav();
  const c=document.getElementById('nav-0');
  c.setAttribute('visible','true');
  // Заголовок
  const tg=document.createElement('a-entity');
  tg.setAttribute('position','0 2.14 0.3');
  const tbg=el('plane',{width:2.7,height:0.28,material:'color:#120800; opacity:0.95; transparent:true; side:double'});
  tg.appendChild(tbg); tg.appendChild(brassFrame(2.7,0.28));
  const ttx=mkText('⚙   ОБЕРІТЬ КЛАС   ⚙','#ffcc66','0.54 0.54 0.54');
  ttx.setAttribute('position','0 0 0.02'); tg.appendChild(ttx);
  c.appendChild(tg);

  [7,8,9,10,11].forEach((cls,i)=>{
    const x=(i-2)*0.68;
    const panel=document.createElement('a-entity');
    panel.setAttribute('position',`${x} 1.53 0.3`);
    panel.setAttribute('class','clickable');
    const {col,accent}=curriculum[cls];
    const bg=el('plane',{width:0.58,height:0.76,material:`color:${col}; opacity:0.96; transparent:true; side:double`});
    panel.appendChild(bg);
    panel.appendChild(brassFrame(0.58,0.76));
    // Велике число
    const num=mkText(`${cls}`,'#ffffff','1.1 1.1 1.1');
    num.setAttribute('position','0 0.14 0.03');
    panel.appendChild(num);
    // Підпис
    const sub=mkText('клас',accent,'0.43 0.43 0.43');
    sub.setAttribute('position','0 -0.09 0.03');
    panel.appendChild(sub);
    // Шестерня
    const gr=el('torus',{radius:0.09,position:`0 -0.28 0.04`,material:`color:#d49040; metalness:0.92; roughness:0.1`});
    gr.setAttribute('segments-radial','8'); gr.setAttribute('segments-tubular','8');
    gr.setAttribute('animation',`property:rotation; to:0 0 360; dur:${2600+i*320}; loop:true; easing:linear`);
    panel.appendChild(gr);
    panel.appendChild(el('cylinder',{radius:0.03,height:0.06,position:`0 -0.28 0.04`,material:'color:#ffcc44; metalness:0.95'}));

    panel.addEventListener('click',()=>showLevel1(cls));
    panel.addEventListener('mouseenter',()=>bg.setAttribute('material',`color:${accent}; opacity:0.28; transparent:true; side:double`));
    panel.addEventListener('mouseleave',()=>bg.setAttribute('material',`color:${col}; opacity:0.96; transparent:true; side:double`));
    c.appendChild(panel);
  });
}

function showLevel1(cls){
  clearNav();
  const c=document.getElementById('nav-1');
  c.setAttribute('visible','true');
  const {col,accent,themes}=curriculum[cls];
  // Заголовок
  const tg=document.createElement('a-entity');
  tg.setAttribute('position','0 2.16 0.5');
  const tbg=el('plane',{width:2.8,height:0.28,material:'color:#120800; opacity:0.95; transparent:true; side:double'});
  tg.appendChild(tbg); tg.appendChild(brassFrame(2.8,0.28));
  const ttx=mkText(`⚙  ${cls} КЛАС — ТЕМИ  ⚙`,accent,'0.5 0.5 0.5');
  ttx.setAttribute('position','0 0 0.02'); tg.appendChild(ttx);
  c.appendChild(tg);

  // Позиції тем
  const positions=[];
  if(themes.length<=4){
    themes.forEach((_,i)=>positions.push({x:i%2===0?-0.78:0.78,y:i<2?1.8:1.26}));
  } else {
    [0,1,2].forEach(i=>positions.push({x:(i-1)*1.12,y:1.8}));
    [3,4].forEach(i=>positions.push({x:(i-3)*1.55-0.78,y:1.22}));
  }
  themes.forEach((theme,i)=>{
    const {x,y}=positions[i];
    const panel=document.createElement('a-entity');
    panel.setAttribute('position',`${x} ${y} 0.5`);
    panel.setAttribute('class','clickable');
    const bg=el('plane',{width:1.34,height:0.46,material:'color:#140900; opacity:0.95; transparent:true; side:double'});
    panel.appendChild(bg); panel.appendChild(brassFrame(1.34,0.46));
    const nt=mkText(theme.name,accent,'0.4 0.4 0.4');
    nt.setAttribute('position','0 0.1 0.02'); panel.appendChild(nt);
    const hasLink=theme.lessons.some(l=>l.url);
    const hint=hasLink?`${theme.lessons.length} занять · є VR-лаб →`:`${theme.lessons.length} занять · →`;
    const ct=mkText(hint,'#998866','0.31 0.31 0.31');
    ct.setAttribute('position','0 -0.1 0.02'); panel.appendChild(ct);
    panel.addEventListener('click',()=>showLevel2(cls,i));
    panel.addEventListener('mouseenter',()=>bg.setAttribute('material',`color:${col}; opacity:0.65; transparent:true; side:double`));
    panel.addEventListener('mouseleave',()=>bg.setAttribute('material','color:#140900; opacity:0.95; transparent:true; side:double'));
    c.appendChild(panel);
  });
  addBack(c,()=>showLevel0());
}

function showLevel2(cls,ti){
  clearNav();
  const c=document.getElementById('nav-2');
  c.setAttribute('visible','true');
  const {accent,themes}=curriculum[cls];
  const theme=themes[ti];
  const panH=0.32+theme.lessons.length*0.2;
  const mp=document.createElement('a-entity');
  mp.setAttribute('position',`0 ${1.05+panH/2} 0.5`);
  const bg=el('plane',{width:2.35,height:panH+0.42,material:'color:#0c0600; opacity:0.97; transparent:true; side:double'});
  mp.appendChild(bg); mp.appendChild(brassFrame(2.35,panH+0.42));
  const th=mkText(`${cls} клас  ·  ${theme.name}`,accent,'0.43 0.43 0.43');
  th.setAttribute('position',`0 ${panH/2+0.07} 0.02`); mp.appendChild(th);
  const divBar=el('box',{width:2.15,height:0.006,depth:0.012,position:`0 ${panH/2-0.17} 0.02`,material:'color:#d49040; metalness:0.85'});
  mp.appendChild(divBar);

  theme.lessons.forEach((lesson,i)=>{
    const y=panH/2-0.31-i*0.2;
    const isLab=lesson.text.startsWith('🔬');
    const hasUrl=!!lesson.url;
    const dot=el('sphere',{radius:0.025,position:`-1.04 ${y+0.024} 0.03`,
      material:`color:${hasUrl?'#44ffaa':isLab?'#55dd55':'#d49040'}; metalness:0.8${hasUrl?'; emissive:#22aa66; emissiveIntensity:0.7':''}`});
    mp.appendChild(dot);

    if(hasUrl){
      const row=document.createElement('a-entity');
      row.setAttribute('position',`-0.98 ${y} 0.02`);
      row.setAttribute('class','clickable');
      const rowBg=el('plane',{width:2.0,height:0.17,material:'color:#003a22; opacity:0.75; transparent:true; side:double'});
      row.appendChild(rowBg);
      const lt=mkText(lesson.text+'  ↗','#55ffaa','0.37 0.37 0.37','left',34);
      lt.setAttribute('position','0 0 0.01'); row.appendChild(lt);
      row.addEventListener('click',()=>window.open(lesson.url,'_blank'));
      row.addEventListener('mouseenter',()=>rowBg.setAttribute('material','color:#005533; opacity:0.92; transparent:true; side:double'));
      row.addEventListener('mouseleave',()=>rowBg.setAttribute('material','color:#003a22; opacity:0.75; transparent:true; side:double'));
      mp.appendChild(row);
    } else {
      const lt=mkText(lesson.text,isLab?'#88ee88':'#ddbb77','0.37 0.37 0.37','left',36);
      lt.setAttribute('position',`-0.98 ${y} 0.02`); mp.appendChild(lt);
    }
  });
  c.appendChild(mp);
  addBack(c,()=>showLevel1(cls));
}

function addBack(container,cb){
  const btn=document.createElement('a-entity');
  btn.setAttribute('position','-1.65 1.05 0.5');
  btn.setAttribute('class','clickable');
  const bg=el('plane',{width:0.62,height:0.26,material:'color:#200c00; opacity:0.95; transparent:true; side:double'});
  btn.appendChild(bg); btn.appendChild(brassFrame(0.62,0.26));
  const t=mkText('← Назад','#e09040','0.41 0.41 0.41');
  t.setAttribute('position','0 0 0.02'); btn.appendChild(t);
  btn.addEventListener('click',cb);
  btn.addEventListener('mouseenter',()=>bg.setAttribute('material','color:#4a1800; opacity:0.97; transparent:true; side:double'));
  btn.addEventListener('mouseleave',()=>bg.setAttribute('material','color:#200c00; opacity:0.95; transparent:true; side:double'));
  container.appendChild(btn);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelector('a-scene').addEventListener('loaded',()=>setTimeout(showLevel0,500));
});
</script>
